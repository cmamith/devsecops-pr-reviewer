name: 'DevSecOps AI PR Reviewer'
description: 'Uses CrewAI to analyze PR diffs for security and reliability issues'

inputs:
  openai_api_key:
    description: 'The OpenAI API key for CrewAI'
    required: true
  diff_file:
    description: 'Path to the diff file to review'
    required: true

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.diff_file }}
  env:
    OPENAI_API_KEY: ${{ inputs.openai_api_key }}
